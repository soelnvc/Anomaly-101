let AC;
const aud = () => { if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; };

const playDrone = (hz=55, dur=2.0, vol=0.07) => {
  try {
    const a=aud(), o=a.createOscillator(), gn=a.createGain();
    const vib=a.createOscillator(), vg=a.createGain();
    vib.frequency.value=0.3+Math.random()*0.4; vg.gain.value=hz*0.006;
    vib.connect(vg); vg.connect(o.frequency);
    o.type='sine'; o.frequency.value=hz;
    const t0=a.currentTime;
    gn.gain.setValueAtTime(0,t0); gn.gain.linearRampToValueAtTime(vol,t0+0.35);
    gn.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(gn); gn.connect(a.destination);
    o.start(t0); vib.start(t0); o.stop(t0+dur); vib.stop(t0+dur);
  } catch(e){}
};

const playInfrasound = () => {
  try {
    const a=aud(), hz=14+Math.random()*18;
    const o=a.createOscillator(), gn=a.createGain();
    o.type='sine'; o.frequency.value=hz;
    gn.gain.setValueAtTime(0.18,a.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+2.5);
    o.connect(gn); gn.connect(a.destination);
    o.start(); o.stop(a.currentTime+2.5);
  } catch(e){}
};

const playCreak = () => {
  try {
    const a=aud(), buf=a.createBuffer(1,a.sampleRate*0.9,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.8)*0.5;
    const s=a.createBufferSource(), gn=a.createGain(), f=a.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=200;
    s.buffer=buf; s.connect(f); f.connect(gn); gn.connect(a.destination);
    gn.gain.value=0.45; s.start();
  } catch(e){}
};

const playStaticBurst = (dur=0.12) => {
  try {
    const a=aud(), buf=a.createBuffer(1,Math.floor(a.sampleRate*dur),a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.9;
    const s=a.createBufferSource(), gn=a.createGain(), f=a.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=2400; f.Q.value=0.5;
    s.buffer=buf; s.connect(f); f.connect(gn); gn.connect(a.destination);
    gn.gain.setValueAtTime(0.35,a.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
    s.start(); s.stop(a.currentTime+dur+0.05);
  } catch(e){}
};

  // Physics
  p.vy += 0.56 * p.gravDir * ef * 60;
  p.vx *= 0.88;
  p.vx = Math.max(Math.min(p.vx, 22), -22);
  p.vy = Math.max(Math.min(p.vy, 22), -22);
  p.x += p.vx * ef * 60;
  p.y += p.vy * ef * 60;
  p.onGround = false;

  // Boundaries
  if(p.y+18 > H-FLOOR){ p.y=H-FLOOR-18; if(p.vy>0)p.vy*=-0.12; if(p.gravDir===1)p.onGround=true; }
  if(p.y-18 < WALL)   { p.y=WALL+18;    if(p.vy<0)p.vy*=-0.12; if(p.gravDir===-1)p.onGround=true; }
  if(p.x-18 < WALL)   { p.x=WALL+18;    p.vx*=-0.4; }
  if(p.x+18 > W-WALL) {
    const d=door();
    if(p.y>d.y && p.y<d.y+d.h) { triggerError(); return; }
    p.x=W-WALL-18; p.vx*=-0.4;
  }

  // Platforms
  for(const pl of platforms()) {
    if(p.x+18>pl.x && p.x-18<pl.x+pl.w && p.y+18>pl.y && p.y-18<pl.y+pl.h) {
      const ovX=Math.min(p.x+18-pl.x, pl.x+pl.w-(p.x-18));
      const ovY=Math.min(p.y+18-pl.y, pl.y+pl.h-(p.y-18));
      if(ovY<=ovX){
        if(p.y<pl.y+pl.h/2){ p.y=pl.y-18; if(p.vy>0)p.vy=0; if(p.gravDir===1)p.onGround=true; }
        else                { p.y=pl.y+pl.h+18; if(p.vy<0)p.vy*=-0.12; if(p.gravDir===-1)p.onGround=true; }
      } else {
        p.x = p.x<pl.x+pl.w/2 ? pl.x-18 : pl.x+pl.w+18;
        p.vx *= -0.4;
      }
    }
  }

  // Duck → reshuffle
  const dk=duck();
  if(p.x+18>dk.x && p.x-18<dk.x+dk.w && p.y+18>dk.y && p.y-18<dk.y+dk.h) {
    shuffleMap(); g.staticFrames=7; g.shakeAmt=22;
    playStaticBurst(0.25); glitch('KEY SEQUENCE CORRUPTED // RESHUFFLED');
  }

  // Record history for mimic
  p.history.push({x:p.x, y:p.y, t});
  if(p.history.length > 800) p.history.shift();

  // Update mimic from history
  const mpos = p.history.find(h => t - h.t >= MIMIC_LAG);
  if(mpos) {
    mimic.x=mpos.x; mimic.y=mpos.y;
    if(!mimic.on && Math.random()<0.004) mimic.on=true; // fades in gradually
    if(mimic.on) mimic.alpha=Math.min(mimic.alpha+dt*0.3, 0.42);
  }
  // Mimic flickers out suddenly sometimes
  if(Math.random() < 0.0015) { mimic.on=!mimic.on; if(!mimic.on) mimic.alpha=0; }

  // Glitch decay
  if(g.active){ g.timer-=dt; g.alpha=Math.max(0,g.alpha-dt*0.55); if(g.timer<=0){g.active=false;} }
  g.chromaOff *= 0.86;
  g.shakeAmt  *= 0.79;
  g.noiseLevel *= 0.88;
  if(g.staticFrames>0) g.staticFrames--;

  // Passive glitch cycle
  g.nextGlitch -= dt;
  if(g.nextGlitch <= 0) {
    glitch(MSGS[Math.floor(Math.random()*MSGS.length)]);
    g.nextGlitch = 4.5 + Math.random()*9;
    if(Math.random()<0.32) playDrone(24+Math.random()*28, 2.4, 0.06);
    if(Math.random()<0.22) g.shakeAmt=9;
    if(Math.random()<0.18) { g.noiseLevel=0.26; g.staticFrames=3; }
    if(Math.random()<0.45) spawnGlitchLines(3+Math.floor(Math.random()*5));
  }

  // Update glitch lines
  g.glitchLines = g.glitchLines.filter(l => { l.life-=dt; return l.life>0; });

  // Fake metadata drift
  meta.lat  += (Math.random()-.5)*0.000038;
  meta.lng  += (Math.random()-.5)*0.000038;
  if(Math.random()<0.04) meta.mem = Math.max(10,Math.min(99, meta.mem+(Math.random()>.5?1:-1)));
  if(Math.random()<0.025) meta.hrTarget = 62+Math.floor(Math.random()*48);
  meta.hr  += (meta.hrTarget-meta.hr)*0.045;
  meta.tick++;

  // CRT flicker
  g.flicker = Math.random()<0.012 ? 0.55+Math.random()*0.3 : 1.0-Math.random()*0.028;
  g.scanOffset = (g.scanOffset + dt*28) % 3;
};

// ── DRAW THE FRAGMENT (player) ────────────────────────
// A pixelated shape that "decoheres" on glitch
const FRAG_CELLS = [
  [-1,-2],[0,-2],[1,-2],
  [-2,-1],[-1,-1],[0,-1],[1,-1],[2,-1],
  [-2,0],[-1,0],[0,0],[1,0],[2,0],
  [-1,1],[0,1],[1,1],
  [-2,2],[0,2],[1,2],
];

const drawFragment = () => {
  const l=lum();
  cx.save(); cx.translate(Math.round(p.x), Math.round(p.y));

  const isGlitching = g.chromaOff > 2;
  const jit = isGlitching ? Math.random()*5-2.5 : 0;

  FRAG_CELLS.forEach(([dx,dy],i) => {
    const a=0.55+Math.random()*0.45;
    const decohere=isGlitching && Math.random()<0.22;
    const offX = decohere ? (Math.random()-.5)*14 : 0;
    cx.fillStyle = decohere
      ? `rgba(${l},${Math.round(l*0.2)},${Math.round(l*0.2)},${a})`
      : `rgba(${l},${l},${l},${a})`;
    cx.fillRect(jit+dx*7+offX, dy*7, 6, 6);
  });

  // Chromatic aberration ghost (red channel shifted right, blue left)
  if(g.chromaOff > 1) {
    cx.globalAlpha=0.14;
    FRAG_CELLS.forEach(([dx,dy]) => {
      cx.fillStyle=`rgba(${l},0,0,1)`;   cx.fillRect(dx*7+g.chromaOff*0.45,dy*7,6,6);
      cx.fillStyle=`rgba(0,0,${l},1)`;   cx.fillRect(dx*7-g.chromaOff*0.45,dy*7,6,6);
    });
    cx.globalAlpha=1;
  }

  // Gravity indicator: small chevron below/above
  cx.font='9px Courier New'; cx.textAlign='center';
  cx.fillStyle=`rgba(${l},${l},${l},0.3)`;
  cx.fillText(p.gravDir===1?'▼':'▲', 0, p.gravDir===1?28:-22);

  cx.restore();
};

const drawArchive = () => {

  cx.fillStyle='#0a0a08'; cx.fillRect(0,0,W,H);

  paperGrad.addColorStop(0,'#c8c0a8'); paperGrad.addColorStop(0.4,'#bfb89a'); paperGrad.addColorStop(1,'#b0a88c');
  cx.fillStyle=paperGrad; cx.fillRect(px,py,pw,ph);

  cx.strokeStyle='rgba(60,50,30,0.18)'; cx.lineWidth=0.5; cx.strokeRect(px+32,py+32,pw-64,ph-64);

  cx.save();

  cx.save();
  cx.translate(px+pw-72,py+ph-72);
  cx.strokeStyle='rgba(120,25,18,0.45)'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(0,0,38,0,Math.PI*2); cx.stroke();
  cx.beginPath(); cx.arc(0,0,30,0,Math.PI*2); cx.stroke();
  cx.font='bold 16px Courier New'; cx.textAlign='center'; cx.fillStyle='rgba(120,25,18,0.50)';
  cx.fillText(d.seal,0,6);
  for(let a=0;a<Math.PI*2;a+=Math.PI/8){ cx.beginPath(); cx.arc(Math.cos(a)*34,Math.sin(a)*34,1.5,0,Math.PI*2); cx.fillStyle='rgba(120,25,18,0.38)'; cx.fill(); }
  cx.restore();

  // Header block
  const tx=px+52, ty=py+55;
  cx.textAlign='left';
  cx.font='bold 11px Courier New'; cx.fillStyle='rgba(20,18,10,0.88)'; cx.fillText(d.org,tx,ty);
  cx.font='10px Courier New'; cx.fillStyle='rgba(20,18,10,0.62)'; cx.fillText(d.orgEn,tx,ty+15);
  cx.fillStyle='rgba(30,22,10,0.4)'; cx.fillRect(tx,ty+22,pw-104,1);

  cx.fillStyle='rgba(30,22,10,0.35)'; cx.fillRect(tx,ty+60,pw-104,1);

  cx.fillStyle='rgba(30,22,10,0.35)'; cx.fillRect(tx,ty+98,pw-104,1);

      if(isRedact) {
        cx.fillStyle='rgba(18,14,8,0.88)';

      const partial = line.slice(0, charsToShow-drawn);

  if(archive.doc === DOCS.length-1 && archive.phase===1) {

  if(archive.phase===2){ cx.fillStyle=`rgba(0,0,0,${1-archive.fadeAlpha})`; cx.fillRect(0,0,W,H); }

  scanlines();
};

  cx.font='13px Courier New'; cx.textAlign='center';

  // Lines appear over time
  const vis=Math.floor(intro.timer*1.6);
  intro.lines.slice(0,vis).forEach((line,i) => {
    const flk=Math.random()>0.96 ? 0.25 : 1;
    cx.fillStyle=`rgba(${l},${l},${l},${0.82*flk})`;
    cx.fillText(line, W/2, H*0.18+i*27);
  });

  // Loading bar
  if(intro.phase>=2) {
    const bw=W*0.38, bh=16, bx=W/2-bw/2, by=H*0.74;
    cx.strokeStyle=`rgba(${l},${l},${l},0.45)`; cx.lineWidth=1;
    cx.strokeRect(bx,by,bw,bh);
    cx.fillStyle=`rgba(${l},${l},${l},0.65)`;
    cx.fillRect(bx,by,bw*intro.load,bh);
    cx.font='9px Courier New';
    cx.fillStyle=`rgba(${l},${l},${l},0.5)`;
    cx.fillText(`LOADING SENSORY ENGINE... ${Math.round(intro.load*100)}%`, W/2, by+bh+18);
    cx.fillText(`[PRESS ANY KEY TO EXPEDITE]`, W/2, by+bh+33);
  }
  scanlines();
};

// ── ERROR SCREEN ──────────────────────────────────────
const drawError = () => {
  cx.fillStyle='#000'; cx.fillRect(0,0,W,H);
  if(!err) return;

  if(err.phase===2) {
    cx.fillStyle=`rgba(0,0,0,${1-err.fadeAlpha})`; cx.fillRect(0,0,W,H);
  }

  const l=168; cx.font='13px Courier New'; cx.textAlign='left';
  const sx=W*0.15, sy=H*0.14;

  err.lines.slice(0,err.shown).forEach((line,i) => {
    if(Math.random()>0.985) return; // flicker
    const bright = line.startsWith('>') ? l : Math.round(l*0.78);
    const isHR = line.includes('HEART_RATE');
    cx.fillStyle = isHR
      ? `rgba(210,210,210,0.95)`
      : `rgba(${bright},${bright},${bright},0.85)`;
    const jitX = Math.random()>0.99 ? (Math.random()-.5)*8 : 0;
    cx.fillText(line, sx+jitX, sy+i*23);
  });

  // Blinking cursor
  if(Math.floor(t*2)%2===0 && err.shown<err.lines.length) {
    cx.fillStyle=`rgba(180,180,180,0.9)`;
    cx.fillRect(sx, sy+err.shown*23-13, 10, 15);
  }
  scanlines();
};

// ── RENDER ────────────────────────────────────────────
const render = () => {
  if(state==='archive'){ drawArchive(); return; }
  if(state==='intro'){ drawIntro(); return; }
  if(state==='error'){ drawError(); return; }

  cx.save();
  const sx=g.shakeAmt>0.5?(Math.random()-.5)*g.shakeAmt:0;
  const sy=g.shakeAmt>0.5?(Math.random()-.5)*g.shakeAmt:0;
  cx.translate(sx,sy);

  if(g.staticFrames>0){ noise(0.94); cx.restore(); return; }

  drawRoom();
  drawDoor();
  drawDuck();
  drawMimic();
  drawFragment();
  drawGlitchMsg();
  glitchLines();
  scanlines();
  vignette();
  noise(g.noiseLevel);
  drawMeta();

  cx.restore();
};

// ── MAIN LOOP ─────────────────────────────────────────
const loop = ts => {
  const dt=Math.min((ts-last)/1000, 0.05); last=ts; t+=dt;

  if(state==='archive') {
    const d = DOCS[archive.doc];
    const lines = archiveFullText(d);
    const bodyLines = lines.slice(9);
    const totalChars = bodyLines.join('\n').length;

    if(archive.phase===0) {
      // Typewriter speed: ~42 chars/sec
      archive.charIdx = Math.min(archive.charIdx + dt*42, totalChars);
      if(archive.charIdx >= totalChars) {
        archive.phase=1; archive.timer=0;
        // Play a low drone on each document reveal
        playDrone(33+archive.doc*8, 3.0, 0.06);
      }
    } else if(archive.phase===1) {
      archive.timer+=dt;
      // Last doc waits for keypress — others auto-advance after 3.8s
      if(archive.doc < DOCS.length-1 && archive.timer>3.8) {
        archive.phase=2; archive.fadeAlpha=1;
      }
    } else if(archive.phase===2) {
      archive.fadeAlpha = Math.max(0, archive.fadeAlpha - dt*1.1);
      if(archive.fadeAlpha<=0) {
        archive.doc++;
        if(archive.doc >= DOCS.length) {
          state='intro'; // last doc → enter terminal
        } else {
          archive.charIdx=0; archive.phase=0; archive.timer=0; archive.fadeAlpha=1;
          playStaticBurst(0.08);
        }
      }
    }
  }

  if(state==='intro') {
    intro.timer+=dt;
    if(intro.timer>0.7 && intro.phase===0) intro.phase=1;
    if(intro.timer>1.6 && intro.phase===1) intro.phase=2;
    intro.load=Math.min(intro.load+dt*0.11,1);
    if(intro.load>=1 && intro.timer>5.5){ state='game'; resetP(); }
  }

  if(state==='error' && err) {
    err.timer+=dt;
    if(err.phase===0) {
      if(err.timer>0.21 && err.shown<err.lines.length){ err.shown++; err.timer=0; if(err.shown===1)playStaticBurst(); if(err.shown===6)playGlitchTone(); }
      if(err.shown>=err.lines.length){ err.phase=1; err.timer=0; }
    } else if(err.phase===1) {
      if(err.timer>2.8){ err.phase=2; err.timer=0; }
    } else if(err.phase===2) {
      err.fadeAlpha=Math.max(0,err.fadeAlpha-dt*0.55);
      if(err.fadeAlpha<=0){ state='game'; resetP(); }
    }
  }

  if(state==='game') update(dt);
  render();
  requestAnimationFrame(loop);
};
requestAnimationFrame(ts=>{ last=ts; loop(ts); });

// ── INPUT ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  e.preventDefault();
  try{ aud(); }catch(ex){}
  if(state==='archive') {
    // Skip typing animation on current doc
    const d = DOCS[archive.doc];
    const lines = archiveFullText(d);
    const totalChars = lines.slice(9).join('\n').length;
    if(archive.phase===0) {
      archive.charIdx = totalChars; // skip to end
    } else if(archive.phase===1 && archive.doc===DOCS.length-1) {
      // Last doc: any key advances to intro
      archive.phase=2; archive.fadeAlpha=1;
    } else if(archive.phase===1) {
      archive.phase=2; archive.fadeAlpha=1;
    }
    return;
  }
  if(state==='intro'){
    intro.load=Math.min(intro.load+0.18,1); intro.timer+=0.55;
    return;
  }
  if(state==='error') return;
  const k=e.key.toLowerCase();
  const fn=kmap[k];
  if(fn) fn();
});
</script>
</body>
</html>
